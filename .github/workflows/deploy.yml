name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject data-config.js
        run: |
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          CATEGORIES="${{ vars.CATEGORIES }}"
          CATEGORIES=${CATEGORIES:-cs.CV}
          sed -i "s/PLACEHOLDER_REPO_OWNER/$REPO_OWNER/g" js/data-config.js
          sed -i "s/PLACEHOLDER_REPO_NAME/$REPO_NAME/g" js/data-config.js
          sed -i "s/PLACEHOLDER_CATEGORIES/$CATEGORIES/g" js/data-config.js
          echo "Injected repo: $REPO_OWNER/$REPO_NAME, categories: $CATEGORIES"

      - name: Inject auth-config.js
        run: |
          PASSWORD="${{ secrets.ACCESS_PASSWORD }}"
          if [ -z "$PASSWORD" ]; then
            PASSWORD_HASH="DISABLED_NO_PASSWORD_SET_IN_SECRETS"
            echo "Password protection DISABLED (no secret set)"
          else
            PASSWORD_HASH=$(echo -n "$PASSWORD" | openssl dgst -sha256 -hex | awk '{print $2}')
            echo "Password protection ENABLED"
          fi
          sed -i "s/PLACEHOLDER_PASSWORD_HASH/$PASSWORD_HASH/" js/auth-config.js

      - name: Stage site files
        run: |
          mkdir -p _site
          cp -r *.html css js images assets buy-me-a-coffee _site/ 2>/dev/null || true
          cp _config.yml _site/ 2>/dev/null || true
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
